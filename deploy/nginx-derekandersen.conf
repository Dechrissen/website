# derekandersen.net — nginx reverse proxy (reference).
#
# Install: drop in sites-available/ and symlink into sites-enabled/, then
# get TLS with certbot:
#   certbot --nginx -d derekandersen.net -d www.derekandersen.net
# Certbot will modify this file to add the managed SSL block.
#
# The Node backend (website.service) listens on 127.0.0.1:51111.
# Ensure server.js binds to 127.0.0.1 explicitly, not 0.0.0.0.
#
# Always run `nginx -t` before reloading nginx.

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name derekandersen.net www.derekandersen.net;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
# Note: certbot will add ssl_certificate directives automatically.
# The ssl_* lines below are added manually for modern TLS config —
# certbot does not add them by default.
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name derekandersen.net www.derekandersen.net;

    ssl_certificate     /etc/letsencrypt/live/derekandersen.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/derekandersen.net/privkey.pem;

    # Modern SSL config (TLS 1.2 + 1.3 only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/derekandersennet;
    error_page 404 = /404;

    location / {
        proxy_pass http://127.0.0.1:51111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}